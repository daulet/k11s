name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download Dependencies
        run: go mod download

      - name: Verify Formatting
        run: |
          UNFORMATTED=$(gofmt -l $(find . -name '*.go' -type f))
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted Go files:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit Tests
        run: go test ./...

      - name: Startup Smoke Test
        run: ./scripts/smoke_startup.sh

      - name: Perf Sanity (Advisory)
        run: ./scripts/perf_sanity.sh
