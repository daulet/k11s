name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  BINARY_NAME: k11s
  DAEMON_BINARY_NAME: k11sd
  TAP_REPO: daulet/homebrew-tap
  TAP_BRANCH: main
  FORMULA_PATH: Formula/k11s.rb
  FORMULA_DESC: "Speed-first CLI/TUI for Kubernetes navigation and operations"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve_tag:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "Tag must start with v (received: ${TAG})" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not infer version from tag ${TAG}" >&2
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release Candidate
    needs: resolve_tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        shell: bash
        run: |
          UNFORMATTED="$(gofmt -l $(find . -name '*.go' -type f))"
          if [[ -n "${UNFORMATTED}" ]]; then
            echo "Unformatted Go files:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Startup smoke test
        run: ./scripts/smoke_startup.sh

  build:
    name: Build Release Bundles
    needs:
      - resolve_tag
      - verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build release archives and checksums
        shell: bash
        run: ./scripts/release_bundles.sh "${{ needs.resolve_tag.outputs.tag }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - resolve_tag
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Show release files
        run: ls -lh dist

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_tag.outputs.tag }}
          name: ${{ needs.resolve_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt

  update_homebrew:
    name: Update Homebrew Tap
    needs:
      - resolve_tag
      - publish
    runs-on: ubuntu-latest
    steps:
      - name: Require tap token
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN}" ]]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required for release publishing."
            exit 1
          fi

      - name: Checkout release repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_tag.outputs.tag }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist

      - name: Resolve macOS checksums
        id: sha
        shell: bash
        run: |
          INTEL_SHA="$(awk '$2 ~ /k11s-x86_64-apple-darwin\.tar\.gz$/ {print $1}' dist/checksums.txt | tail -n1)"
          ARM_SHA="$(awk '$2 ~ /k11s-aarch64-apple-darwin\.tar\.gz$/ {print $1}' dist/checksums.txt | tail -n1)"

          if [[ -z "${INTEL_SHA}" || -z "${ARM_SHA}" ]]; then
            echo "Failed to locate required macOS checksums in dist/checksums.txt" >&2
            exit 1
          fi

          echo "intel_sha=${INTEL_SHA}" >> "$GITHUB_OUTPUT"
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render formula
        shell: bash
        run: |
          python3 .github/scripts/update_homebrew_formula.py \
            --formula "homebrew-tap/${FORMULA_PATH}" \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ needs.resolve_tag.outputs.tag }}" \
            --version "${{ needs.resolve_tag.outputs.version }}" \
            --binary "${BINARY_NAME}" \
            --daemon-binary "${DAEMON_BINARY_NAME}" \
            --sha-intel "${{ steps.sha.outputs.intel_sha }}" \
            --sha-arm "${{ steps.sha.outputs.arm_sha }}" \
            --desc "${FORMULA_DESC}"

      - name: Commit and push tap update
        shell: bash
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git status --porcelain -- "${FORMULA_PATH}")" ]]; then
            echo "Formula already up to date."
            exit 0
          fi

          git add "${FORMULA_PATH}"
          git commit -m "k11s ${{ needs.resolve_tag.outputs.version }}"
          git push origin HEAD:"${TAP_BRANCH}"
